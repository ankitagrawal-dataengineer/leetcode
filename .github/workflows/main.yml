name: LeetCode Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"   # Runs every 5 minutes

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: python -m pip install requests

      - name: LeetCode Sync
        env:
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          DESTINATION_FOLDER: DSA
        run: python .github/scripts/sync_leetcode.py

      - name: Move SQL solutions to SQL folder
        run: |
          mkdir -p SQL
          # Move any .sql files from DSA/ to SQL/, preserving the problem folder name
          find DSA -name "*.sql" | while read file; do
            dir=$(dirname "$file" | sed 's|^DSA|SQL|')
            mkdir -p "$dir"
            mv "$file" "$dir/"
          done
          # Remove empty directories left behind in DSA/
          find DSA -type d -empty -delete 2>/dev/null || true

      - name: Commit and push SQL moves
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "[LeetCode SQL Sync] Move SQL solutions to SQL folder"
          git push